<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mesas Boda">
<meta name="theme-color" content="#1c3c1c">
<title>Mesas Boda</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--cream:#f3f8f3;--parch:#deeede;--gold:#4e8b4e;--gold2:#8fbc8f;--brown:#1c3c1c;--brown2:#2e5e2e;--rose:#5a8a7a;--ink:#0a160a;--card:#f7fdf7;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Jost',sans-serif;background:#f3f8f3;color:var(--ink);}

/* HEADER — sticky, always solid */
#hdr{background:#1c3c1c;color:var(–gold2);padding:14px 14px 0;position:fixed;top:0;left:0;right:0;z-index:200;box-shadow:0 3px 16px rgba(0,0,0,.55);-webkit-transform:translateZ(0);transform:translateZ(0);}
#hdr h1{font-family:‘Cormorant Garamond’,serif;font-size:1.55rem;font-weight:300;letter-spacing:.05em;line-height:1.1;}
#hdr h1 span{color:var(–gold);font-style:italic;}
.hdr-sub{font-size:.63rem;letter-spacing:.13em;text-transform:uppercase;opacity:.6;margin-top:1px;}
#search-row{display:flex;align-items:center;gap:8px;margin-top:9px;}
#searchbox{flex:1;border:1px solid rgba(78,139,78,.4);background:rgba(255,255,255,.08);color:var(–cream);border-radius:24px;padding:7px 14px;font-family:‘Jost’,sans-serif;font-size:.85rem;outline:none;}
#searchbox::placeholder{color:rgba(250,246,240,.35);}
#searchbox:focus{border-color:var(–gold);}
#tot{font-size:.7rem;background:#4e8b4e;color:var(–brown);border-radius:20px;padding:4px 10px;font-weight:500;white-space:nowrap;flex-shrink:0;}
.tabs{display:flex;border-top:1px solid rgba(78,139,78,.2);margin-top:10px;}
.tab{flex:1;background:none;border:none;color:rgba(143,188,143,.55);font-family:‘Jost’,sans-serif;font-size:.82rem;padding:10px 4px 8px;cursor:pointer;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;}
.tab.on{color:var(–gold2);border-bottom-color:var(–gold);}

/* SEL BAR */
#selbar{display:none;background:#2e5e2e;color:#f3f8f3;padding:9px 14px;font-size:.84rem;border-bottom:2px solid #4e8b4e;align-items:center;gap:10px;position:fixed;left:0;right:0;z-index:190;-webkit-transform:translateZ(0);transform:translateZ(0);}
#selbar.on{display:flex;}
#selnm{flex:1;font-weight:500;}
#selnm em{font-style:normal;color:var(–gold2);}
.pill{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.28);color:var(–cream);border-radius:20px;padding:5px 13px;font-family:‘Jost’,sans-serif;font-size:.78rem;cursor:pointer;}

/* PAGES */
#pg-mesas{display:block;padding:12px 11px 100px;}
#pg-plano{display:none;flex-direction:column;}
#pg-plano.on{display:flex;}

/* MESA CARDS */
.mcard{background:#f7fdf7;border-radius:14px;margin-bottom:12px;box-shadow:0 2px 10px rgba(28,60,28,.14);overflow:hidden;border:1.5px solid rgba(78,139,78,.17);transition:border-color .2s,box-shadow .2s;}
.mcard.droptgt{border-color:var(–gold);box-shadow:0 0 0 3px rgba(78,139,78,.25);}
.mcard.presid{border-color:var(–gold);background:linear-gradient(135deg,#f0faf0,#e8f5e8);}
.mcard.shidden{display:none;}
.mhdr{padding:10px 12px 8px;display:flex;align-items:center;gap:6px;border-bottom:1px solid rgba(78,139,78,.13);}
.micon{font-size:1.15rem;flex-shrink:0;cursor:pointer;padding:2px 3px;border-radius:5px;}
.micon:active{background:#deeede;}
.mtitlewrap{flex:1;min-width:0;cursor:pointer;}
.mtitle{font-family:‘Cormorant Garamond’,serif;font-size:1rem;font-weight:600;color:var(–brown);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mtinput{display:none;font-family:‘Cormorant Garamond’,serif;font-size:1rem;font-weight:600;color:var(–brown);border:none;border-bottom:2px solid var(–gold);background:transparent;outline:none;width:100%;padding:1px 0;}
.capbadge{font-size:.6rem;background:rgba(78,139,78,.12);color:var(–brown2);border-radius:20px;padding:2px 6px;max-width:76px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0;}
.mcnt{font-size:.67rem;background:#deeede;color:var(–brown2);border-radius:20px;padding:2px 7px;font-weight:500;flex-shrink:0;}
.presid .mcnt{background:#8fbc8f;color:var(–brown);}
.hbtn{background:none;border:none;cursor:pointer;font-size:.85rem;padding:3px 4px;border-radius:6px;color:#bbb;line-height:1;flex-shrink:0;}
.hbtn:active{background:#deeede;}
.hbtn.del{color:#d9a0a0;}
.chev{color:var(–gold);font-size:.82rem;transition:transform .25s;cursor:pointer;padding:4px;flex-shrink:0;}
.mcard.coll .chev{transform:rotate(-90deg);}
.glist{list-style:none;overflow:hidden;transition:max-height .3s ease;}
.mcard.coll .glist{max-height:0!important;}
.gitem{display:flex;align-items:center;padding:8px 11px;border-bottom:1px solid rgba(0,0,0,.04);gap:7px;}
.gitem:last-child{border-bottom:none;}
.gitem.sel{background:#d8edd8;border-left:3px solid var(–gold);padding-left:8px;}
.gitem.hidden{display:none;}
.gitem.iscap{background:rgba(78,139,78,.07);}
.gdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.gnm{flex:1;font-size:.86rem;cursor:pointer;}
.gninput{display:none;flex:1;border:none;border-bottom:2px solid var(–gold);background:transparent;font-family:‘Jost’,sans-serif;font-size:.86rem;color:var(–ink);outline:none;padding:1px 0;min-width:0;}
.gcap{font-size:.75rem;flex-shrink:0;cursor:pointer;opacity:.28;padding:2px;}
.iscap .gcap{opacity:1;}
.ggrp{font-size:.63rem;color:#aaa;text-align:right;max-width:72px;flex-shrink:0;}
.gedit,.gdel{background:none;border:none;cursor:pointer;font-size:.72rem;padding:3px 3px;border-radius:5px;flex-shrink:0;line-height:1;}
.gedit{color:#c8b89a;}
.gdel{color:#d9a0a0;}
.gdel:active{color:var(–rose);}
.addrow{display:flex;align-items:center;gap:8px;padding:7px 11px 8px;border-top:1px dashed rgba(78,139,78,.18);}
.addinput{flex:1;border:none;border-bottom:1px solid rgba(78,139,78,.3);background:transparent;font-family:‘Jost’,sans-serif;font-size:.82rem;color:var(–ink);padding:3px 2px;outline:none;}
.addinput::placeholder{color:#ccc;}
.addbtn{background:#4e8b4e;color:var(–brown);border:none;border-radius:20px;padding:5px 11px;font-family:‘Jost’,sans-serif;font-size:.75rem;font-weight:500;cursor:pointer;}
.movebtn{display:none;width:100%;padding:10px;background:#1c3c1c;color:var(–gold2);border:none;font-family:‘Cormorant Garamond’,serif;font-size:.95rem;cursor:pointer;}
.movebtn:active{background:#2e5e2e;}
body.hassel .movebtn{display:block;}
body.hassel .srcmesa .movebtn{display:none;}
.emptymsg{text-align:center;padding:36px 20px;color:#bbb;font-family:‘Cormorant Garamond’,serif;font-size:1.1rem;display:none;}

/* PLANO */
#plano-bar{background:#1c3c1c;padding:8px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
#plano-bar span{color:var(–gold2);font-size:.72rem;opacity:.65;flex:1;}
.pbtn{background:rgba(255,255,255,.12);border:1px solid rgba(78,139,78,.3);color:var(–gold2);border-radius:20px;padding:5px 13px;font-family:‘Jost’,sans-serif;font-size:.75rem;cursor:pointer;}
#pcwrap{position:relative;background:#f3f8f3;overflow:hidden;}
#pcwrap::before{content:’’;position:absolute;inset:0;background-image:radial-gradient(circle,rgba(78,139,78,.17) 1px,transparent 1px);background-size:26px 26px;pointer-events:none;}
.tcircle{position:absolute;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none;touch-action:none;text-align:center;padding:5px;border:3px solid rgba(255,255,255,.65);box-shadow:0 3px 14px rgba(0,0,0,.25);cursor:grab;}
.tcircle.dragging{cursor:grabbing;box-shadow:0 8px 24px rgba(0,0,0,.4);transform:scale(1.06);z-index:10;}
.tcnm{font-family:‘Cormorant Garamond’,serif;font-weight:600;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.45);line-height:1.1;}
.tccap{font-family:‘Jost’,sans-serif;color:rgba(255,255,255,.88);text-shadow:0 1px 2px rgba(0,0,0,.4);line-height:1.1;}
.tccnt{font-family:‘Jost’,sans-serif;color:rgba(255,255,255,.72);line-height:1;}

/* TOAST */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(90px);background:#1c3c1c;color:var(–cream);border-radius:30px;padding:10px 18px;display:flex;align-items:center;gap:12px;font-size:.83rem;box-shadow:0 4px 20px rgba(0,0,0,.35);z-index:500;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);}
#undobtn{background:#4e8b4e;color:var(–brown);border:none;border-radius:20px;padding:5px 13px;font-family:‘Jost’,sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;}

/* FAB */
#fabrow{position:fixed;bottom:20px;right:14px;display:flex;flex-direction:column;gap:9px;z-index:300;align-items:flex-end;}
#fabrow.hidden{display:none;}
.fab{border:none;border-radius:50px;cursor:pointer;font-family:‘Jost’,sans-serif;font-weight:500;box-shadow:0 3px 14px rgba(0,0,0,.3);display:flex;align-items:center;gap:5px;transition:transform .15s;}
.fab:active{transform:scale(.93);}
#fab1{background:#1c3c1c;color:var(–gold2);padding:11px 18px 11px 13px;font-size:.83rem;}
#fab2{background:#5a8a7a;color:#fff;padding:10px 16px 10px 12px;font-size:.81rem;}

/* MODAL */
#moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:400;align-items:flex-end;justify-content:center;}
#moverlay.on{display:flex;}
#mdl{background:#f7fdf7;border-radius:20px 20px 0 0;padding:22px 18px 36px;width:100%;max-width:500px;animation:sup .25s ease;}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
#mdl h2{font-family:‘Cormorant Garamond’,serif;font-size:1.3rem;color:var(–brown);margin-bottom:14px;}
.mlbl{font-size:.72rem;text-transform:uppercase;letter-spacing:.09em;color:#999;margin-bottom:4px;}
.minput{width:100%;border:1px solid rgba(78,139,78,.4);border-radius:10px;padding:10px 13px;font-family:‘Jost’,sans-serif;font-size:.92rem;color:var(–ink);background:#f3f8f3;outline:none;margin-bottom:13px;}
.minput:focus{border-color:var(–gold);}
.icongrid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;margin-bottom:16px;}
.iopt{font-size:1.2rem;text-align:center;padding:6px 2px;border-radius:8px;cursor:pointer;border:2px solid transparent;}
.iopt.picked{border-color:var(–gold);background:#deeede;}
.macts{display:flex;gap:10px;}
.mbtn{flex:1;border:none;border-radius:12px;padding:12px;font-family:‘Jost’,sans-serif;font-size:.9rem;font-weight:500;cursor:pointer;}
.mbtn.cancel{background:#deeede;color:var(–brown2);}
.mbtn.ok{background:#1c3c1c;color:var(–gold2);}
</style>

</head>
<body>

<div id="hdr">
  <h1>&#128141; Boda <span>Serena &amp; Antonio</span></h1>
  <div class="hdr-sub">Distribuci&#243;n de mesas</div>
  <div id="search-row">
    <input id="searchbox" type="search" placeholder="Buscar invitado&#8230;" autocomplete="off" autocorrect="off" spellcheck="false">
    <span id="tot">&#8212; inv.</span>
  </div>
  <div class="tabs">
    <button class="tab on" data-tab="mesas">&#128203; Mesas</button>
    <button class="tab" data-tab="plano">&#128506; Plano</button>
  </div>
</div>

<div id="selbar">
  <span id="selnm"></span>
  <button class="pill" id="cancelsel">&#10005; Cancelar</button>
</div>

<div id="pg-mesas">
  <p class="emptymsg" id="emptymsg">No se encontraron invitados</p>
</div>

<div id="pg-plano">
  <div id="plano-bar">
    <span>Arrastra las mesas para organizarlas</span>
    <button class="pbtn" id="preset">&#8635; Reiniciar</button>
  </div>
  <div id="pcwrap"></div>
</div>

<div id="toast"><span id="toastmsg"></span><button id="undobtn">Deshacer</button></div>

<div id="fabrow">
  <button class="fab" id="fab1">&#xff0b; Nueva mesa</button>
  <button class="fab" id="fab2">&#8635; Restaurar todo</button>
</div>

<div id="moverlay">
  <div id="mdl">
    <h2 id="mdltitle">Nueva mesa</h2>
    <div id="namewrap"><div class="mlbl">Nombre de la mesa</div><input class="minput" id="mdlname" type="text" placeholder="Ej: Mesa 21"></div>
    <div class="mlbl">Icono</div>
    <div class="icongrid" id="icongrid"></div>
    <div class="macts">
      <button class="mbtn cancel" id="mdlcancel">Cancelar</button>
      <button class="mbtn ok" id="mdlok">Guardar</button>
    </div>
  </div>
</div>

// TABS
let curTab="mesas";
document.querySelectorAll(".tab").forEach(btn=>{
  btn.addEventListener("click",()=>{
    curTab=btn.dataset.tab;
    document.querySelectorAll(".tab").forEach(b=>b.classList.remove("on"));

      document.getElementById("pg-mesas").style.display="none";

      sizePlano();renderPlano();

// SIZE plano canvas to viewport
function sizePlano(){
  const hdrH=document.getElementById("hdr").offsetHeight;
  const barH=document.getElementById("plano-bar").offsetHeight;
  const h=window.innerHeight-hdrH-barH;
  document.getElementById("pcwrap").style.height=Math.max(300,h)+"px";
  document.getElementById("pcwrap").style.width="100%";
}
window.addEventListener("resize",()=>{if(curTab==="plano"){sizePlano();renderPlano();}});

// RENDER MESAS
const pm=document.getElementById("pg-mesas");
function render(){
  pm.querySelectorAll(".mcard").forEach(e=>e.remove());
  document.getElementById("tot").textContent=ms.reduce((s,m)=>s+m.guests.length,0)+" inv.";
  ms.forEach(mesa=>{
    const card=document.createElement("div");
    card.className="mcard"+(mesa.presid?" presid":"")+(coll.has(mesa.id)?" coll":"");
    if(sel){card.classList.add(sel.fid===mesa.id?"srcmesa":"droptgt");}
    card.dataset.id=mesa.id;
    // header
    const hdr=document.createElement("div");hdr.className="mhdr";
    const mic=document.createElement("span");mic.className="micon";mic.textContent=mesa.icon;
    mic.addEventListener("click",e=>{e.stopPropagation();openMdl(mesa.id);});
    const tw=document.createElement("div");tw.className="mtitlewrap";
    const tEl=document.createElement("div");tEl.className="mtitle";tEl.textContent=mesa.name;
    const tIn=document.createElement("input");tIn.className="mtinput";tIn.value=mesa.name;
    tw.append(tEl,tIn);
    tw.addEventListener("click",()=>toggleColl(mesa.id,card));
    tIn.addEventListener("blur",()=>{const v=tIn.value.trim();if(v){ms.find(m=>m.id===mesa.id).name=v;sv();}tIn.style.display="none";tEl.style.display="";render();});
    tIn.addEventListener("keydown",e=>{if(e.key==="Enter")tIn.blur();if(e.key==="Escape"){tIn.value=mesa.name;tIn.blur();}});
    const cb=document.createElement("span");cb.className="capbadge";
    cb.textContent=mesa.captain?("⭐ "+mesa.captain.split(" ")[0]):"Sin capitán";
    if(!mesa.captain)cb.style.opacity=".35";
    const cnt=document.createElement("span");cnt.className="mcnt";cnt.textContent=mesa.guests.length;
    const eb=document.createElement("button");eb.className="hbtn";eb.textContent="✏️";
    eb.addEventListener("click",e=>{e.stopPropagation();tEl.style.display="none";tIn.style.display="block";tIn.focus();tIn.select();});
    const db=document.createElement("button");db.className="hbtn del";db.textContent="🗑";
    db.addEventListener("click",e=>{e.stopPropagation();delMesa(mesa.id);});
    const ch=document.createElement("span");ch.className="chev";ch.textContent="▾";
    ch.addEventListener("click",e=>{e.stopPropagation();toggleColl(mesa.id,card);});
    hdr.append(mic,tw,cb,cnt,eb,db,ch);card.appendChild(hdr);
    // guests
    const ul=document.createElement("ul");ul.className="glist";
    ul.style.maxHeight=coll.has(mesa.id)?"0":(mesa.guests.length*43+58)+"px";
    mesa.guests.forEach(g=>{
      const isCap=mesa.captain===g.name;
      const li=document.createElement("li");
      li.className="gitem"+(sel&&sel.nm===g.name&&sel.fid===mesa.id?" sel":"")+(isCap?" iscap":"");
      const dot=document.createElement("span");dot.className="gdot";dot.style.background=GC[g.group]||"#ccc";
      const nEl=document.createElement("span");nEl.className="gnm";nEl.textContent=g.name;
      const nIn=document.createElement("input");nIn.className="gninput";nIn.value=g.name;nIn.type="text";
      const capI=document.createElement("span");capI.className="gcap";capI.textContent="⭐";
      capI.addEventListener("click",e=>{e.stopPropagation();const m=ms.find(m=>m.id===mesa.id);m.captain=(m.captain===g.name)?null:g.name;sv();render();if(curTab==="plano")renderPlano();});
      const grp=document.createElement("span");grp.className="ggrp";grp.textContent=g.group;
      const gedit=document.createElement("button");gedit.className="gedit";gedit.textContent="✏️";
      gedit.addEventListener("click",e=>{e.stopPropagation();nEl.style.display="none";grp.style.display="none";gedit.style.display="none";gdel.style.display="none";nIn.style.display="block";nIn.focus();nIn.select();});
      const gdel=document.createElement("button");gdel.className="gdel";gdel.textContent="✕";
      gdel.addEventListener("click",e=>{e.stopPropagation();delGuest(mesa.id,g.name);});
      nIn.addEventListener("blur",()=>{
        const nv=nIn.value.trim();
        if(nv&&nv!==g.name){const m=ms.find(m=>m.id===mesa.id),gx=m.guests.find(x=>x.name===g.name);if(gx){if(m.captain===g.name)m.captain=nv;lastAct={type:"ren",mid:mesa.id,old:g.name,nw:nv};gx.name=nv;g.name=nv;sv();showToast("Nombre cambiado");}}
        nIn.style.display="none";grp.style.display="";gedit.style.display="";gdel.style.display="";nEl.textContent=g.name;nEl.style.display="";
      });
      nIn.addEventListener("keydown",e=>{if(e.key==="Enter")nIn.blur();if(e.key==="Escape"){nIn.value=g.name;nIn.blur();}});
      nEl.addEventListener("click",()=>{if(nIn.style.display==="block")return;onTap(g,mesa.id);});
      li.addEventListener("click",e=>{if(e.target===li)onTap(g,mesa.id);});
      li.append(dot,nEl,nIn,capI,grp,gedit,gdel);ul.appendChild(li);
    });
    // add row
    const ar=document.createElement("div");ar.className="addrow";
    const ai=document.createElement("input");ai.className="addinput";ai.type="text";ai.placeholder="Añadir invitado…";
    const ab=document.createElement("button");ab.className="addbtn";ab.textContent="+ Añadir";
    ab.addEventListener("click",()=>addGuest(mesa.id,ai));
    ai.addEventListener("keydown",e=>{if(e.key==="Enter")addGuest(mesa.id,ai);});
    ar.append(ai,ab);ul.appendChild(ar);
    card.appendChild(ul);
    const mb=document.createElement("button");mb.className="movebtn";
    mb.textContent="↪ Mover aquí — "+mesa.name.split("–")[0].trim();
    mb.addEventListener("click",()=>moveTo(mesa.id));
    card.appendChild(mb);
    pm.insertBefore(card,document.getElementById("emptymsg"));
  });
  const sb=document.getElementById("selbar");
  if(sel){document.body.classList.add("hassel");document.getElementById("selnm").innerHTML="Moviendo: <em>"+sel.nm+"</em>";sb.classList.add("on");}
  else{document.body.classList.remove("hassel");sb.classList.remove("on");}
}

function toggleColl(id,card){
  const ul=card.querySelector(".glist"),m=ms.find(m=>m.id===id);
  if(coll.has(id)){coll.delete(id);card.classList.remove("coll");ul.style.maxHeight=(m.guests.length*43+58)+"px";}
  else{coll.add(id);card.classList.add("coll");ul.style.maxHeight="0";}
}
function delGuest(mid,name){
  if(!confirm("¿Eliminar a \""+name+"\"?"))return;
  const m=ms.find(m=>m.id===mid),idx=m.guests.findIndex(g=>g.name===name);if(idx<0)return;
  if(m.captain===name)m.captain=null;
  const[r]=m.guests.splice(idx,1);lastAct={type:"dg",mid,guest:r,idx};sv();showToast("\""+name+"\" eliminado/a");render();
}
function delMesa(id){
  const m=ms.find(m=>m.id===id);
  if(!confirm("¿Eliminar \""+m.name+"\"?"))return;
  lastAct={type:"dm",mesa:d(m),idx:ms.findIndex(x=>x.id===id)};
  ms=ms.filter(x=>x.id!==id);sv();showToast("Mesa eliminada");render();
}
function addGuest(mid,inp){
  const name=inp.value.trim();if(!name)return;
  ms.find(m=>m.id===mid).guests.push({name,group:"—"});
  lastAct={type:"ag",mid,name};sv();inp.value="";coll.delete(mid);showToast(name+" añadido/a");render();
}
function onTap(g,mid){
  if(sel){
    if(sel.nm===g.name&&sel.fid===mid){sel=null;render();return;}
    if(sel.fid!==mid){moveTo(mid);return;}
  }
  sel={nm:g.name,grp:g.group,fid:mid};
  coll.forEach(id=>{if(id!==mid)coll.delete(id);});render();
}
function moveTo(tid){
  if(!sel||sel.fid===tid)return;
  const from=ms.find(m=>m.id===sel.fid),to=ms.find(m=>m.id===tid);
  const idx=from.guests.findIndex(g=>g.name===sel.nm);if(idx<0)return;
  const[g]=from.guests.splice(idx,1);to.guests.push(g);
  lastAct={type:"mv",guest:g,fid:sel.fid,tid};sv();showToast(g.name+" → "+to.name.split("–")[0].trim());sel=null;render();
}
document.getElementById("cancelsel").addEventListener("click",()=>{sel=null;render();});

// UNDO
function showToast(msg){
  document.getElementById("toastmsg").textContent=msg;document.getElementById("toast").classList.add("show");
  clearTimeout(utimer);utimer=setTimeout(()=>document.getElementById("toast").classList.remove("show"),4500);
}
document.getElementById("undobtn").addEventListener("click",()=>{
  if(!lastAct)return;const a=lastAct;lastAct=null;
  if(a.type==="mv"){const to=ms.find(m=>m.id===a.tid),fr=ms.find(m=>m.id===a.fid);const i=to.guests.findIndex(g=>g.name===a.guest.name);if(i>=0){to.guests.splice(i,1);fr.guests.push(a.guest);}}
  else if(a.type==="ag"){const m=ms.find(m=>m.id===a.mid);if(m){const i=m.guests.findIndex(g=>g.name===a.name);if(i>=0)m.guests.splice(i,1);}}
  else if(a.type==="dm"){ms.splice(a.idx,0,a.mesa);}
  else if(a.type==="ren"){const m=ms.find(m=>m.id===a.mid);if(m){const g=m.guests.find(g=>g.name===a.nw);if(g)g.name=a.old;}}
  else if(a.type==="dg"){const m=ms.find(m=>m.id===a.mid);if(m)m.guests.splice(a.idx,0,a.guest);}
  sv();document.getElementById("toast").classList.remove("show");render();
});

// SEARCH
document.getElementById("searchbox").addEventListener("input",function(){
  const q=this.value.trim().toLowerCase();
  pm.querySelectorAll(".mcard").forEach(card=>{
    const items=card.querySelectorAll(".gitem");let hit=false;
    items.forEach(li=>{const m=!q||li.textContent.toLowerCase().includes(q);li.classList.toggle("hidden",!m);if(m)hit=true;});
    card.classList.toggle("shidden",q&&!hit);
    if(q&&hit){const id=card.dataset.id,ul=card.querySelector(".glist"),m=ms.find(m=>m.id===id);coll.delete(id);card.classList.remove("coll");ul.style.maxHeight=(m.guests.length*43+58)+"px";}
  });
  document.getElementById("emptymsg").style.display=(q&&!pm.querySelector(".mcard:not(.shidden)"))?"block":"none";
});

document.getElementById("fab2").addEventListener("click",()=>{
  if(!confirm("¿Restaurar la distribución original? Se perderán todos los cambios."))return;
  ms=d(INI);pp={};sel=null;lastAct=null;coll.clear();render();sv();
});

// MODAL
let mdlId=null,pickedIco="🎉";
function buildGrid(){
  const g=document.getElementById("icongrid");g.innerHTML="";
  ICONS.forEach(ic=>{const el=document.createElement("div");el.className="iopt"+(ic===pickedIco?" picked":"");el.textContent=ic;el.addEventListener("click",()=>{pickedIco=ic;g.querySelectorAll(".iopt").forEach(x=>x.classList.remove("picked"));el.classList.add("picked");});g.appendChild(el);});
}
function openMdl(existId){
  mdlId=existId||null;const nw=document.getElementById("namewrap"),ni=document.getElementById("mdlname");
  if(existId){document.getElementById("mdltitle").textContent="Cambiar icono";nw.style.display="none";pickedIco=ms.find(m=>m.id===existId).icon;}
  else{document.getElementById("mdltitle").textContent="Nueva mesa";nw.style.display="";ni.value="";pickedIco="🎉";}
  buildGrid();document.getElementById("moverlay").classList.add("on");if(!existId)setTimeout(()=>ni.focus(),120);
}
document.getElementById("mdlok").addEventListener("click",()=>{
  if(mdlId){ms.find(m=>m.id===mdlId).icon=pickedIco;sv();}
  else{const name=document.getElementById("mdlname").value.trim();if(!name)return;ms.push({id:uid(),name,icon:pickedIco,captain:null,guests:[]});sv();}
  document.getElementById("moverlay").classList.remove("on");render();
});
document.getElementById("mdlcancel").addEventListener("click",()=>document.getElementById("moverlay").classList.remove("on"));
document.getElementById("moverlay").addEventListener("click",e=>{if(e.target===document.getElementById("moverlay"))document.getElementById("moverlay").classList.remove("on");});
document.getElementById("fab1").addEventListener("click",()=>openMdl(null));

// PLANO
const pcw=document.getElementById("pcwrap");
const SZ=68;
function defPos(){
  const W=pcw.clientWidth||360,H=pcw.clientHeight||500;
  const cols=Math.max(1,Math.floor((W-10)/(SZ+16)));
  const p={};ms.forEach((m,i)=>{const c=i%cols,r=Math.floor(i/cols);p[m.id]={x:c*(SZ+16)+10,y:r*(SZ+20)+10};});
  return p;
}
function renderPlano(){
  pcw.innerHTML="";
  if(!ms.every(m=>pp[m.id])){pp=defPos();svp();}
  ms.forEach((m,i)=>{
    if(!pp[m.id])pp[m.id]={x:10,y:10};
    const pos=pp[m.id],col=TCC[i%TCC.length];
    const el=document.createElement("div");el.className="tcircle";
    el.style.cssText="width:"+SZ+"px;height:"+SZ+"px;background:"+col+";left:"+pos.x+"px;top:"+pos.y+"px;";
    const sn=m.name.replace(/Mesa\s*/i,"M").split("–")[0].trim();
    const nd=document.createElement("div");nd.className="tcnm";nd.style.fontSize=sn.length>8?".56rem":".66rem";nd.textContent=sn;
    const cd=document.createElement("div");cd.className="tccap";cd.style.fontSize=".56rem";cd.textContent=m.captain?"⭐ "+m.captain.split(" ")[0]:"";
    const ctd=document.createElement("div");ctd.className="tccnt";ctd.style.fontSize=".56rem";ctd.textContent=m.guests.length+" 👤";
    el.append(nd,cd,ctd);drag(el,m.id);pcw.appendChild(el);
  });
}
function drag(el,id){
  let sx,sy,sl,st,on=false;
  function start(cx,cy){const r=pcw.getBoundingClientRect();sx=cx-r.left;sy=cy-r.top;sl=pp[id].x;st=pp[id].y;on=true;el.classList.add("dragging");}
  function move(cx,cy){if(!on)return;const r=pcw.getBoundingClientRect();const dx=(cx-r.left)-sx,dy=(cy-r.top)-sy;let nx=sl+dx,ny=st+dy;nx=Math.max(0,Math.min(r.width-SZ,nx));ny=Math.max(0,Math.min(r.height-SZ,ny));el.style.left=nx+"px";el.style.top=ny+"px";pp[id]={x:nx,y:ny};}
  function end(){if(!on)return;on=false;el.classList.remove("dragging");svp();}
  el.addEventListener("touchstart",e=>{e.preventDefault();const t=e.touches[0];start(t.clientX,t.clientY);},{passive:false});
  el.addEventListener("touchmove",e=>{e.preventDefault();const t=e.touches[0];move(t.clientX,t.clientY);},{passive:false});
  el.addEventListener("touchend",e=>{e.preventDefault();end();},{passive:false});
  el.addEventListener("mousedown",e=>{start(e.clientX,e.clientY);e.preventDefault();});
  window.addEventListener("mousemove",e=>{if(on)move(e.clientX,e.clientY);});
  window.addEventListener("mouseup",()=>{if(on)end();});
}
document.getElementById("preset").addEventListener("click",()=>{pp=defPos();svp();renderPlano();});

function fixOffset(){
  const hh=document.getElementById("hdr").offsetHeight;
  document.getElementById("pg-mesas").style.paddingTop=(hh+4)+"px";
  document.getElementById("selbar").style.top=hh+"px";
  document.getElementById("pg-plano").style.paddingTop=hh+"px";
}
window.addEventListener("resize",fixOffset);
window.addEventListener("orientationchange",()=>setTimeout(fixOffset,200));


// INIT
render();
fixOffset();
