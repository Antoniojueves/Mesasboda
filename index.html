<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mesas Boda">
<meta name="theme-color" content="#3d1f00">
<title>Mesas Boda 💍</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--cream:#faf6f0;--parch:#f2ead8;--gold:#c9963a;--gold2:#e8c97a;--brown:#3d1f00;--brown2:#6b3a10;--rose:#c97a7a;--ink:#1a0a00;--card:#fffdf7;--shadow:rgba(61,31,0,.15);--sel:#fff3cd;--selbdr:#c9963a;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--ink);display:flex;flex-direction:column;}
#app-header{background:var(--brown);color:var(--gold2);padding:14px 14px 0;flex-shrink:0;box-shadow:0 2px 14px rgba(0,0,0,.5);z-index:100;position:relative;}
#app-header h1{font-family:'Cormorant Garamond',serif;font-size:1.55rem;font-weight:300;letter-spacing:.06em;line-height:1.1;}
#app-header h1 span{color:var(--gold);font-style:italic;}
.header-sub{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;opacity:.6;margin-top:1px;}
.header-row{display:flex;align-items:center;gap:8px;margin-top:9px;}
#searchbox{flex:1;border:1px solid rgba(201,150,58,.4);background:rgba(255,255,255,.08);color:var(--cream);border-radius:24px;padding:7px 14px;font-family:'Jost',sans-serif;font-size:.85rem;outline:none;}
#searchbox::placeholder{color:rgba(250,246,240,.35);}
#searchbox:focus{border-color:var(--gold);background:rgba(255,255,255,.13);}
#total-badge{font-size:.7rem;background:var(--gold);color:var(--brown);border-radius:20px;padding:4px 10px;font-weight:500;white-space:nowrap;flex-shrink:0;}
.tab-bar{display:flex;border-top:1px solid rgba(201,150,58,.2);margin-top:10px;}
.tab-btn{flex:1;background:none;border:none;color:rgba(232,201,122,.6);font-family:'Jost',sans-serif;font-size:.82rem;padding:10px 6px 8px;cursor:pointer;border-bottom:2px solid transparent;letter-spacing:.04em;transition:color .2s,border-color .2s;}
.tab-btn.active{color:var(--gold2);border-bottom-color:var(--gold);}
#sel-bar{display:none;background:var(--brown2);color:var(--cream);padding:9px 14px;font-size:.84rem;border-bottom:2px solid var(--gold);align-items:center;gap:10px;flex-shrink:0;z-index:99;}
#sel-bar.on{display:flex;}
#sel-name{flex:1;font-weight:500;}
#sel-name em{font-style:normal;color:var(--gold2);}
.pill-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:var(--cream);border-radius:20px;padding:5px 13px;font-family:'Jost',sans-serif;font-size:.78rem;cursor:pointer;}
.pill-btn:active{background:rgba(255,255,255,.28);}
#pages{flex:1;overflow:hidden;position:relative;}
.page{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;}
.page.active{display:block;}
#page-mesas{padding:12px 11px 90px;}
.mesa-card{background:var(--card);border-radius:14px;margin-bottom:12px;box-shadow:0 2px 10px var(--shadow);overflow:hidden;border:1.5px solid rgba(201,150,58,.18);transition:border-color .2s,box-shadow .2s;}
.mesa-card.drop-target{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,150,58,.25);}
.mesa-card.presid{border-color:var(--gold);background:linear-gradient(135deg,#fffdf0,#fff8e1);}
.mesa-card.search-hidden{display:none;}
.mesa-header{padding:10px 12px 8px;display:flex;align-items:center;gap:6px;border-bottom:1px solid rgba(201,150,58,.15);}
.mesa-icon{font-size:1.15rem;flex-shrink:0;cursor:pointer;padding:2px 3px;border-radius:6px;}
.mesa-icon:active{background:var(--parch);}
.mesa-title-wrap{flex:1;min-width:0;cursor:pointer;}
.mesa-title{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;color:var(--brown);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mesa-title-input{display:none;font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;color:var(--brown);border:none;border-bottom:2px solid var(--gold);background:transparent;outline:none;width:100%;padding:1px 0;}
.captain-badge{font-size:.62rem;background:rgba(201,150,58,.13);color:var(--brown2);border-radius:20px;padding:2px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px;flex-shrink:0;}
.mesa-count{font-size:.68rem;background:var(--parch);color:var(--brown2);border-radius:20px;padding:2px 7px;font-weight:500;flex-shrink:0;}
.presid .mesa-count{background:var(--gold2);color:var(--brown);}
.hdr-btn{background:none;border:none;cursor:pointer;font-size:.85rem;padding:3px 4px;border-radius:7px;color:#bbb;line-height:1;flex-shrink:0;}
.hdr-btn:active{background:var(--parch);}
.hdr-btn.del{color:#d9a0a0;}
.chevron{color:var(--gold);font-size:.82rem;transition:transform .25s;flex-shrink:0;cursor:pointer;padding:4px;}
.mesa-card.collapsed .chevron{transform:rotate(-90deg);}
.guest-list{list-style:none;overflow:hidden;transition:max-height .3s ease;}
.mesa-card.collapsed .guest-list{max-height:0!important;}
.guest-item{display:flex;align-items:center;padding:8px 11px;border-bottom:1px solid rgba(0,0,0,.04);gap:7px;}
.guest-item:last-child{border-bottom:none;}
.guest-item.selected{background:var(--sel);border-left:3px solid var(--selbdr);padding-left:8px;}
.guest-item.hidden{display:none;}
.guest-item.is-captain{background:rgba(201,150,58,.07);}
.g-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.g-name{flex:1;font-size:.86rem;line-height:1.3;cursor:pointer;}
.g-name-input{display:none;flex:1;border:none;border-bottom:2px solid var(--gold);background:transparent;font-family:'Jost',sans-serif;font-size:.86rem;color:var(--ink);outline:none;padding:1px 0;min-width:0;}
.g-cap{font-size:.75rem;flex-shrink:0;cursor:pointer;opacity:.35;padding:2px;}
.is-captain .g-cap{opacity:1;}
.g-group{font-size:.65rem;color:#aaa;text-align:right;max-width:76px;line-height:1.2;flex-shrink:0;}
.g-edit-btn,.g-del-btn{background:none;border:none;cursor:pointer;font-size:.72rem;padding:3px 4px;border-radius:5px;flex-shrink:0;line-height:1;}
.g-edit-btn{color:#c8b89a;}
.g-edit-btn:active{background:var(--parch);}
.g-del-btn{color:#d9a0a0;}
.g-del-btn:active{color:var(--rose);}
.add-guest-row{display:flex;align-items:center;gap:8px;padding:7px 11px 8px;border-top:1px dashed rgba(201,150,58,.18);}
.add-guest-input{flex:1;border:none;border-bottom:1px solid rgba(201,150,58,.3);background:transparent;font-family:'Jost',sans-serif;font-size:.82rem;color:var(--ink);padding:3px 2px;outline:none;}
.add-guest-input::placeholder{color:#ccc;}
.add-guest-btn{background:var(--gold);color:var(--brown);border:none;border-radius:20px;padding:5px 11px;font-family:'Jost',sans-serif;font-size:.75rem;font-weight:500;cursor:pointer;}
.add-guest-btn:active{opacity:.8;}
.move-btn{display:none;width:100%;padding:10px;background:var(--brown);color:var(--gold2);border:none;font-family:'Cormorant Garamond',serif;font-size:.95rem;letter-spacing:.04em;cursor:pointer;}
.move-btn:active{background:var(--brown2);}
body.has-sel .move-btn{display:block;}
body.has-sel .source-mesa .move-btn{display:none;}
.empty-msg{text-align:center;padding:36px 20px;color:#bbb;font-family:'Cormorant Garamond',serif;font-size:1.1rem;display:none;}
#page-plano{padding:0;overflow:hidden;}
#page-plano.active{display:flex;flex-direction:column;}
#plano-toolbar{background:var(--brown);padding:8px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
#plano-toolbar span{color:var(--gold2);font-size:.73rem;opacity:.7;flex:1;}
.plano-btn{background:rgba(255,255,255,.12);border:1px solid rgba(201,150,58,.3);color:var(--gold2);border-radius:20px;padding:5px 13px;font-family:'Jost',sans-serif;font-size:.75rem;cursor:pointer;}
.plano-btn:active{background:rgba(255,255,255,.22);}
#plano-canvas-wrap{flex:1;position:relative;overflow:hidden;background:var(--cream);}
#plano-canvas-wrap::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(201,150,58,.15) 1px,transparent 1px);background-size:26px 26px;}
.table-circle{position:absolute;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:grab;user-select:none;box-shadow:0 3px 14px rgba(0,0,0,.25);border:3px solid rgba(255,255,255,.65);touch-action:none;text-align:center;padding:5px;}
.table-circle.dragging{cursor:grabbing;box-shadow:0 8px 24px rgba(0,0,0,.4);transform:scale(1.06);z-index:10;}
.tc-name{font-family:'Cormorant Garamond',serif;font-weight:600;color:#fff;line-height:1.1;text-shadow:0 1px 3px rgba(0,0,0,.45);}
.tc-captain{font-family:'Jost',sans-serif;color:rgba(255,255,255,.88);line-height:1.1;text-shadow:0 1px 2px rgba(0,0,0,.4);}
.tc-count{font-family:'Jost',sans-serif;color:rgba(255,255,255,.7);line-height:1;}
#undo-toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(90px);background:var(--brown);color:var(--cream);border-radius:30px;padding:10px 18px;display:flex;align-items:center;gap:12px;font-size:.83rem;box-shadow:0 4px 20px rgba(0,0,0,.35);z-index:500;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;}
#undo-toast.show{transform:translateX(-50%) translateY(0);}
#undo-btn{background:var(--gold);color:var(--brown);border:none;border-radius:20px;padding:5px 13px;font-family:'Jost',sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;}
#fab-row{position:fixed;bottom:20px;right:14px;display:flex;flex-direction:column;gap:9px;z-index:200;align-items:flex-end;}
#fab-row.hidden{display:none;}
.fab{border:none;border-radius:50px;cursor:pointer;font-family:'Jost',sans-serif;font-weight:500;box-shadow:0 3px 14px rgba(0,0,0,.3);display:flex;align-items:center;gap:6px;transition:transform .15s;}
.fab:active{transform:scale(.94);}
#fab-add{background:var(--brown);color:var(--gold2);padding:11px 18px 11px 14px;font-size:.84rem;}
#fab-reset{background:var(--rose);color:#fff;padding:10px 16px 10px 12px;font-size:.81rem;}
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:400;align-items:flex-end;justify-content:center;}
#modal-overlay.on{display:flex;}
#modal{background:var(--card);border-radius:20px 20px 0 0;padding:22px 18px 34px;width:100%;max-width:500px;animation:sup .25s ease;}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
#modal h2{font-family:'Cormorant Garamond',serif;font-size:1.3rem;color:var(--brown);margin-bottom:14px;}
.m-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.09em;color:#999;margin-bottom:4px;}
.m-input{width:100%;border:1px solid rgba(201,150,58,.4);border-radius:10px;padding:10px 13px;font-family:'Jost',sans-serif;font-size:.92rem;color:var(--ink);background:var(--cream);outline:none;margin-bottom:13px;}
.m-input:focus{border-color:var(--gold);}
.icon-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;margin-bottom:16px;}
.icon-opt{font-size:1.2rem;text-align:center;padding:6px 2px;border-radius:8px;cursor:pointer;border:2px solid transparent;}
.icon-opt.picked{border-color:var(--gold);background:var(--parch);}
.modal-actions{display:flex;gap:10px;}
.modal-btn{flex:1;border:none;border-radius:12px;padding:12px;font-family:'Jost',sans-serif;font-size:.9rem;font-weight:500;cursor:pointer;}
.modal-btn.cancel{background:var(--parch);color:var(--brown2);}
.modal-btn.confirm{background:var(--brown);color:var(--gold2);}
.modal-btn:active{opacity:.85;}
</style>
</head>
<body>
<div id="app-header">
  <h1>💍 Boda <span>Serena &amp; Antonio</span></h1>
  <div class="header-sub">Distribución de mesas</div>
  <div class="header-row" id="search-row">
    <input id="searchbox" type="search" placeholder="Buscar invitado…" autocomplete="off" autocorrect="off" spellcheck="false">
    <span id="total-badge">— inv.</span>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="mesas">📋 Mesas</button>
    <button class="tab-btn" data-tab="plano">🗺 Plano</button>
  </div>
</div>
<div id="sel-bar">
  <span id="sel-name"></span>
  <button class="pill-btn" id="cancel-sel-btn">✕ Cancelar</button>
</div>
<div id="pages">
  <div class="page active" id="page-mesas">
    <p class="empty-msg" id="empty-msg">No se encontraron invitados</p>
  </div>
  <div class="page" id="page-plano">
    <div id="plano-toolbar">
      <span>Arrastra las mesas para organizarlas</span>
      <button class="plano-btn" id="plano-reset-btn">↺ Reiniciar</button>
    </div>
    <div id="plano-canvas-wrap"></div>
  </div>
</div>
<div id="undo-toast"><span id="undo-msg"></span><button id="undo-btn">Deshacer</button></div>
<div id="fab-row">
  <button class="fab" id="fab-add">＋ Nueva mesa</button>
  <button class="fab" id="fab-reset">↺ Restaurar todo</button>
</div>
<div id="modal-overlay">
  <div id="modal">
    <h2 id="modal-title">Nueva mesa</h2>
    <div id="name-wrap"><div class="m-label">Nombre de la mesa</div><input class="m-input" id="modal-name" type="text" placeholder="Ej: Mesa 21"></div>
    <div class="m-label">Icono</div>
    <div class="icon-grid" id="icon-grid"></div>
    <div class="modal-actions">
      <button class="modal-btn cancel" id="modal-cancel">Cancelar</button>
      <button class="modal-btn confirm" id="modal-confirm">Guardar</button>
    </div>
  </div>
</div>

function toggleCol(id,card){
const ul=card.querySelector(”.guest-list”),m=mesas.find(m=>m.id===id);
if(collapsed.has(id)){collapsed.delete(id);card.classList.remove(“collapsed”);ul.style.maxHeight=(m.guests.length*44+60)+“px”;}
else{collapsed.add(id);card.classList.add(“collapsed”);ul.style.maxHeight=“0”;}
}
function deleteGuest(mesaId,name){
if(!confirm(”¿Eliminar a "”+name+”"?”))return;
const m=mesas.find(m=>m.id===mesaId),idx=m.guests.findIndex(g=>g.name===name);if(idx===-1)return;
if(m.captain===name)m.captain=null;
const[r]=m.guests.splice(idx,1);lastAction={type:“del-guest”,mesaId,guest:r,idx};save();showUndo(”"”+name+”" eliminado/a”);render();
}
function deleteMesa(id){
const m=mesas.find(m=>m.id===id);
if(!confirm(m.guests.length>0?”¿Eliminar "”+m.name+”" con “+m.guests.length+” invitado(s)?”:”¿Eliminar "”+m.name+”"?”))return;
lastAction={type:“del”,mesa:deep(m),idx:mesas.findIndex(x=>x.id===id)};
mesas=mesas.filter(x=>x.id!==id);save();showUndo(“Mesa eliminada”);render();
}
function addGuest(mesaId,input){
const name=input.value.trim();if(!name)return;
mesas.find(m=>m.id===mesaId).guests.push({name,group:”—”});
lastAction={type:“add”,mesaId,name};save();input.value=””;collapsed.delete(mesaId);showUndo(name+” añadido/a”);render();
}
function onGuestTap(guest,mesaId){
if(selGuest){
if(selGuest.name===guest.name&&selGuest.fromId===mesaId){selGuest=null;render();return;}
if(selGuest.fromId!==mesaId){moveSelTo(mesaId);return;}
}
selGuest={name:guest.name,group:guest.group,fromId:mesaId};
collapsed.forEach(id=>{if(id!==mesaId)collapsed.delete(id);});render();
}
function moveSelTo(toId){
if(!selGuest||selGuest.fromId===toId)return;
const from=mesas.find(m=>m.id===selGuest.fromId),to=mesas.find(m=>m.id===toId);
const idx=from.guests.findIndex(g=>g.name===selGuest.name);if(idx===-1)return;
const[g]=from.guests.splice(idx,1);to.guests.push(g);
lastAction={type:“move”,guest:g,fromId:selGuest.fromId,toId};save();showUndo(g.name+” → “+to.name.split(”–”)[0].trim());selGuest=null;render();
}
document.getElementById(“cancel-sel-btn”).addEventListener(“click”,()=>{selGuest=null;render();});

// UNDO
function showUndo(msg){
document.getElementById(“undo-msg”).textContent=msg;document.getElementById(“undo-toast”).classList.add(“show”);
clearTimeout(undoTimer);undoTimer=setTimeout(()=>document.getElementById(“undo-toast”).classList.remove(“show”),4500);
}
document.getElementById(“undo-btn”).addEventListener(“click”,()=>{
if(!lastAction)return;const a=lastAction;lastAction=null;
if(a.type===“move”){const to=mesas.find(m=>m.id===a.toId),from=mesas.find(m=>m.id===a.fromId);const i=to.guests.findIndex(g=>g.name===a.guest.name);if(i!==-1){to.guests.splice(i,1);from.guests.push(a.guest);}}
else if(a.type===“add”){const m=mesas.find(m=>m.id===a.mesaId);if(m){const i=m.guests.findIndex(g=>g.name===a.name);if(i!==-1)m.guests.splice(i,1);}}
else if(a.type===“del”){mesas.splice(a.idx,0,a.mesa);}
else if(a.type===“rename”){const m=mesas.find(m=>m.id===a.mesaId);if(m){const g=m.guests.find(g=>g.name===a.newName);if(g)g.name=a.oldName;}}
else if(a.type===“del-guest”){const m=mesas.find(m=>m.id===a.mesaId);if(m)m.guests.splice(a.idx,0,a.guest);}
save();document.getElementById(“undo-toast”).classList.remove(“show”);render();
});

// PLANO
const canvasWrap=document.getElementById(“plano-canvas-wrap”);
const SIZE=90;
function defaultPos(){
const W=canvasWrap.clientWidth||360,H=canvasWrap.clientHeight||500;
const cols=Math.max(1,Math.floor((W-10)/(SIZE+16)));
const pos={};
mesas.forEach((m,i)=>{const col=i%cols,row=Math.floor(i/cols);pos[m.id]={x:col*(SIZE+16)+10,y:row*(SIZE+20)+10};});
return pos;
}
function renderPlano(){
canvasWrap.innerHTML=””;
const hasPosForAll=mesas.every(m=>planoPos[m.id]);
if(!hasPosForAll){planoPos=defaultPos();savePos();}
mesas.forEach((m,i)=>{
if(!planoPos[m.id])planoPos[m.id]={x:10+i*10,y:10+i*10};
const pos=planoPos[m.id],col=TC_COLORS[i%TC_COLORS.length];
const el=document.createElement(“div”);el.className=“table-circle”;
el.style.cssText=“width:”+SIZE+“px;height:”+SIZE+“px;background:”+col+”;left:”+pos.x+“px;top:”+pos.y+“px;”;
const sn=m.name.replace(/Mesa\s+/i,“M”).split(”–”)[0].trim();
const nd=document.createElement(“div”);nd.className=“tc-name”;nd.style.fontSize=sn.length>8?”.58rem”:”.68rem”;nd.textContent=sn;
const cd=document.createElement(“div”);cd.className=“tc-captain”;cd.style.fontSize=”.58rem”;cd.textContent=m.captain?“⭐ “+m.captain.split(” “)[0]:””;
const ctd=document.createElement(“div”);ctd.className=“tc-count”;ctd.style.fontSize=”.58rem”;ctd.textContent=m.guests.length+” 👤”;
el.append(nd,cd,ctd);makeDraggable(el,m.id);canvasWrap.appendChild(el);
});
}
function renderPlanoIfVisible(){if(document.getElementById(“page-plano”).classList.contains(“active”))renderPlano();}
function makeDraggable(el,mesaId){
let sx,sy,sl,st,dragging=false;
function start(cx,cy){
const wr=canvasWrap.getBoundingClientRect();
sx=cx-wr.left;sy=cy-wr.top;sl=planoPos[mesaId].x;st=planoPos[mesaId].y;
dragging=true;el.classList.add(“dragging”);
}
function move(cx,cy){
if(!dragging)return;
const wr=canvasWrap.getBoundingClientRect();
const cx2=cx-wr.left,cy2=cy-wr.top;
let nx=sl+(cx2-sx),ny=st+(cy2-sy);
nx=Math.max(0,Math.min(wr.width-SIZE,nx));
ny=Math.max(0,Math.min(wr.height-SIZE,ny));
el.style.left=nx+“px”;el.style.top=ny+“px”;
planoPos[mesaId]={x:nx,y:ny};
}
function end(){if(!dragging)return;dragging=false;el.classList.remove(“dragging”);savePos();}
el.addEventListener(“touchstart”,e=>{e.preventDefault();const t=e.touches[0];start(t.clientX,t.clientY);},{passive:false});
el.addEventListener(“touchmove”,e=>{e.preventDefault();const t=e.touches[0];move(t.clientX,t.clientY);},{passive:false});
el.addEventListener(“touchend”,e=>{e.preventDefault();end();},{passive:false});
el.addEventListener(“mousedown”,e=>{start(e.clientX,e.clientY);e.preventDefault();});
window.addEventListener(“mousemove”,e=>{move(e.clientX,e.clientY);});
window.addEventListener(“mouseup”,end);
}
document.getElementById(“plano-reset-btn”).addEventListener(“click”,()=>{planoPos=defaultPos();savePos();renderPlano();});

render();
</script>
